<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Temperature Converter</title>

    <link rel="stylesheet"
          href="style.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>🌡 Temperature Converter</h1>

        <p class="subtitle">
            Convert temperature instantly between
            Celsius, Fahrenheit and Kelvin.
        </p>

        <div class="input-group">

            <label>Enter Temperature</label>

            <input type="number"
                   id="temperature"
                   placeholder="Enter value">

        </div>

        <div class="input-group">

            <label>Select Unit</label>

            <select id="unit">

                <option value="celsius">Celsius (°C)</option>

                <option value="fahrenheit">
                    Fahrenheit (°F)
                </option>

                <option value="kelvin">
                    Kelvin (K)
                </option>

            </select>

        </div>

        <div class="button-group">
            <button id="convertBtn">Convert</button>
            <button id="swapBtn" class="secondary">Swap Units</button>
            <button id="resetBtn" class="secondary">Reset</button>
        </div>

        <p id="error"></p>

        <div class="result-box">

            <h2>Converted Values</h2>

            <div class="result">

                <span>Celsius</span>

                <strong id="celsiusResult">--</strong>

            </div>

            <div class="result">

                <span>Fahrenheit</span>

                <strong id="fahrenheitResult">--</strong>

            </div>

            <div class="result">

                <span>Kelvin</span>

                <strong id="kelvinResult">--</strong>

            </div>

            <button id="copyBtn" class="secondary full-width">Copy Result</button>

        </div>

        <div class="history-box">
            <h3>Recent Conversions</h3>
            <ul id="historyList">
                <li>No conversions yet.</li>
            </ul>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
