<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" rx="40" fill="url(#bg)" />
  <rect x="100" y="80" width="1000" height="640" rx="36" fill="#f8f4fb" />
  <text x="120" y="160" font-family="Poppins, sans-serif" font-size="56" font-weight="700" fill="#1f2937">Temperature Converter</text>
  <text x="120" y="230" font-family="Poppins, sans-serif" font-size="24" fill="#4b5563">Convert temperature instantly between Celsius, Fahrenheit and Kelvin.</text>
  <rect x="120" y="280" width="960" height="80" rx="24" fill="#fff" stroke="#e5e7eb" stroke-width="2" />
  <text x="150" y="335" font-family="Poppins, sans-serif" font-size="22" fill="#111827">Enter value</text>
  <rect x="120" y="390" width="960" height="70" rx="24" fill="#fff" stroke="#e5e7eb" stroke-width="2" />
  <text x="150" y="440" font-family="Poppins, sans-serif" font-size="22" fill="#111827">Select Unit</text>
  <rect x="120" y="490" width="960" height="120" rx="34" fill="#eef2ff" />
  <text x="160" y="560" font-family="Poppins, sans-serif" font-size="28" font-weight="700" fill="#6d28d9">Converted Values</text>
  <line x1="140" y1="590" x2="1040" y2="590" stroke="#dbeafe" stroke-width="2" />
  <text x="160" y="640" font-family="Poppins, sans-serif" font-size="22" fill="#111827">Celsius</text>
  <text x="900" y="640" font-family="Poppins, sans-serif" font-size="22" fill="#7c3aed">--</text>
  <text x="160" y="690" font-family="Poppins, sans-serif" font-size="22" fill="#111827">Fahrenheit</text>
  <text x="900" y="690" font-family="Poppins, sans-serif" font-size="22" fill="#7c3aed">--</text>
  <text x="160" y="740" font-family="Poppins, sans-serif" font-size="22" fill="#111827">Kelvin</text>
  <text x="900" y="740" font-family="Poppins, sans-serif" font-size="22" fill="#7c3aed">--</text>
</svg>
